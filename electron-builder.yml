appId: com.soundcue.app
productName: SoundCue
directories:
  output: release
mac:
  category: public.app-category.utilities
  target:
    - dir
  identity: null
  forceCodeSigning: false
  extendInfo:
    NSMicrophoneUsageDescription: "This app needs microphone access for real-time audio analysis."
win:
  target:
    - nsis
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - dist/**/*
  - package.json
  - node_modules/**/*
asar: true
asarUnpack:
  - "**/node_modules/@huggingface/**"
  - "**/node_modules/onnxruntime-node/**"
  - "**/node_modules/onnxruntime-common/**"
  - "**/node_modules/onnxruntime-web/**"
  - "**/*.wasm"
  - "**/*.onnx"
